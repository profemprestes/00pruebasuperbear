<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Información para Padres - Gran Facu Aventura</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #87CEEB;
            font-family: 'Nunito';
            padding: 20px;
        }

        .card {
            background: white;
            border: 4px solid #4E342E;
            border-radius: 16px;
            padding: 25px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.1);
        }

        .info-item {
            margin: 15px 0;
            border-bottom: 1px dashed #CCC;
            padding-bottom: 5px;
        }

        .btn {
            display: block;
            text-align: center;
            background: #FFD600;
            border: 3px solid #4E342E;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            text-decoration: none;
            color: #4E342E;
            font-family: 'Fredoka One';
            box-shadow: 0 4px 0 #4E342E;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2 style="font-family: 'Fredoka One'; text-align: center;">🛡️ DATOS DE LA MISIÓN</h2>
        <div class="info-item"><b>📍 LUGAR:</b> KBOOM (Av. Italia 3421)</div>
        <div class="info-item"><b>📅 FECHA:</b> Domingo 24 de Mayo</div>
        <div class="info-item"><b>⏰ HORA:</b> 18:30 a 21:00 hs</div>
        <div class="info-item" style="color: #D32F2F;"><b>⚠️ REQUISITO:</b> Medias y ropa cómoda.</div>

        <a href="https://maps.google.com" class="btn">📍 VER EN GOOGLE MAPS</a>
        <a href="#" class="btn" style="background: #4CAF50; color: white;">📅 AGENDAR EVENTO</a>
        <hr style="margin: 20px 0;">
        <h3 style="font-family: 'Fredoka One'; text-align: center;">CONFIRMACIÓN (Save Slot)</h3>
        <button class="btn" onclick="alert('¡Misión Confirmada! Slot de guardado actualizado.')">💾 CONFIRMAR
            ASISTENCIA</button>
    </div>
</body>

</html>
