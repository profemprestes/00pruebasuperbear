<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Facu Aventura 🐻 Nivel 9</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --amarillo: #FFD600;
            --marron-oscuro: #4E342E;
            --verde-game: #4CAF50;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* TÍTULO PRINCIPAL */
        .title-screen {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #4CAF50 50%, #2E7D32 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-title {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--amarillo);
            text-shadow: 5px 5px 0 var(--marron-oscuro), 0 8px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 10;
            animation: titleBounce 1.5s ease-in-out infinite alternate;
            line-height: 1.1;
        }

        .hero-bear {
            width: clamp(140px, 30vw, 220px);
            height: auto;
            z-index: 10;
            margin: 20px 0;
            animation: bearFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.2));
        }

        .start-button {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            padding: 20px 50px;
            background: var(--amarillo);
            color: var(--marron-oscuro);
            border: 5px solid var(--marron-oscuro);
            border-radius: 20px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 8px 0 var(--marron-oscuro);
            animation: pulseButton 2s ease-in-out infinite;
        }

        /* ESCENA DE DIÁLOGO */
        .dialogue-scene {
            display: none;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #4CAF50 100%);
            position: relative;
            overflow: hidden;
        }

        .dialogue-scene.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .npc-character {
            position: absolute;
            bottom: 25%;
            left: 10%;
            z-index: 5;
            width: clamp(150px, 40vw, 250px);
            animation: npcIdle 3s ease-in-out infinite;
            filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.3));
        }

        .dialogue-box-rpg {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 25px;
            border: 6px solid var(--marron-oscuro);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;
            z-index: 100;
            cursor: pointer;
        }

        .dialogue-name {
            display: inline-block;
            background: var(--amarillo);
            color: var(--marron-oscuro);
            font-family: 'Fredoka One', cursive;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1.1rem;
            margin-bottom: 15px;
            border: 3px solid var(--marron-oscuro);
        }

        .dialogue-text-area {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.5;
            min-height: 70px;
            font-weight: 700;
        }

        .choice-container {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }

        .choice-btn {
            font-family: 'Fredoka One', cursive;
            background: #f0f0f0;
            color: var(--marron-oscuro);
            border: 4px solid var(--marron-oscuro);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 6px 0 var(--marron-oscuro);
            text-align: left;
            width: 100%;
        }

        .choice-btn:hover {
            background: var(--amarillo);
            transform: translateY(-3px);
            box-shadow: 0 9px 0 var(--marron-oscuro);
        }

        .choice-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 var(--marron-oscuro);
        }

        .dialogue-indicator {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 1.5rem;
            animation: indicatorBlink 0.8s infinite;
        }

        /* ANIMACIONES */
        @keyframes bearFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes titleBounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-10px);
            }
        }

        @keyframes pulseButton {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes npcIdle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes indicatorBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- PANTALLA DE TÍTULO -->
    <div class="title-screen" id="titleScreen">
        <div style="margin-bottom: 20px;"><img src="../../../public/LOGO_FACU.png" style="width: 130px;"></div>
        <div class="game-title"><span>GRAN FACU</span><span>AVENTURA</span></div>
        <img src="../../../public/facu_bear_sin_fondo.png" class="hero-bear">
        <button class="start-button" onclick="startAdventure()">¡TOCÁ PARA EMPEZAR!</button>
    </div>

    <!-- ESCENA DE DIÁLOGO -->
    <div class="dialogue-scene" id="dialogueScene">
        <div class="npc-character">
            <img src="../../../public/facu_bear_sin_fondo.png" style="width: 100%;">
        </div>

        <div class="dialogue-box-rpg" id="dialogueBox" onclick="advanceDialogue()">
            <div class="dialogue-name">🐻 Facundo</div>
            <div class="dialogue-text-area" id="dialogueText"></div>

            <div class="choice-container" id="choiceContainer">
                <button class="choice-btn" onclick="selectMode('pro')">👾 JUGADOR PRO (Aventureros)</button>
                <button class="choice-btn" onclick="selectMode('guardian')">🛡️ MODO GUARDIÁN (Info Padres)</button>
            </div>

            <div class="dialogue-indicator" id="indicator">▼</div>
        </div>
    </div>

    <script>
        const dialogues = [
            '¡Che, despertate! Facu acaba de desbloquear el Nivel 9.',
            'La misión es en KBOOM y precisamos armar tremendo equipo.',
            'Identificate para entrar al servidor:'
        ];

        let currentIdx = 0;
        let isTyping = false;

        function startAdventure() {
            document.getElementById('titleScreen').style.display = 'none';
            document.getElementById('dialogueScene').classList.add('active');
            showDialogue();
        }

        function showDialogue() {
            if (currentIdx >= dialogues.length) {
                showChoices();
                return;
            }

            isTyping = true;
            const textElement = document.getElementById('dialogueText');
            const fullText = dialogues[currentIdx];
            textElement.textContent = '';
            let charIdx = 0;

            const interval = setInterval(() => {
                if (charIdx < fullText.length) {
                    textElement.textContent += fullText[charIdx];
                    charIdx++;
                } else {
                    clearInterval(interval);
                    isTyping = false;
                }
            }, 30);
        }

        function advanceDialogue() {
            if (isTyping) return;
            currentIdx++;
            showDialogue();
        }

        function showChoices() {
            document.getElementById('dialogueText').style.display = 'none';
            document.getElementById('indicator').style.display = 'none';
            document.getElementById('choiceContainer').style.display = 'flex';
            // Deshabilitar el click en la caja para que no avance más
            document.getElementById('dialogueBox').onclick = null;
        }

        function selectMode(mode) {
            if (mode === 'pro') {
                window.location.href = './facu-aventura.html';
            } else {
                window.location.href = './adultos.html';
            }
        }
    </script>
</body>

</html>
