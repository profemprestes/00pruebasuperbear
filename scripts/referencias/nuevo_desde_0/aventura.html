<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Modo Aventurero - Selección de Héroe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #87CEEB;
            font-family: 'Nunito';
            padding: 20px;
            text-align: center;
        }

        .hero-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .hero-card {
            background: white;
            border: 4px solid #4E342E;
            border-radius: 12px;
            padding: 10px;
            width: 110px;
            cursor: pointer;
            box-shadow: 0 6px 0 #4E342E;
        }

        .hero-card.selected {
            border-color: #FFD600;
            box-shadow: 0 0 15px #FFD600, 0 6px 0 #4E342E;
        }

        .hero-card img {
            width: 100%;
        }

        .dialog-box {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            background: white;
            border: 4px solid #4E342E;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .portrait {
            width: 80px;
            height: 80px;
        }

        .btn-next {
            background: #FFD600;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Fredoka One';
            border: 3px solid #4E342E;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <h1 style="font-family: 'Fredoka One'; color: white; text-shadow: 2px 2px #4E342E;">ELIGE TU AVATAR</h1>
    <div class="hero-grid">
        <div class="hero-card" onclick="sel('Baaren', '¡Prepárense para el impacto! 🐻')"><img
                src="../../../public/personajes/Baaren.render.png">
            <p>Baaren</p>
        </div>
        <div class="hero-card" onclick="sel('Shicka', '¡Si nos perdemos, es culpa del mapa! 000')"><img
                src="../../../public/personajes/Shicka_render_.png">
            <p>Shicka</p>
        </div>
        <div class="hero-card" onclick="sel('Tortuga', 'Despacio se llega lejos... 🐢')"><img
                src="../../../public/personajes/Turtle_render.png">
            <p>Tortuga</p>
        </div>
    </div>
    <div class="dialog-box">
        <img src="../../../public/personajes/Shicka_render_.png" class="portrait" id="p">
        <div>
            <b id="n" style="color: #FFD600;">Shicka</b>
            <p id="t">¡Che, despertate! Elegí tu personaje para empezar la misión.</p>
        </div>
    </div>
    <button id="next" class="btn-next" onclick="location.href='minijuegos.html'">¡A LA ACCIÓN!</button>
    <script>
        function sel(name, msg) {
            document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('n').innerText = name;
            document.getElementById('t').innerText = msg;
            document.getElementById('next').style.display = 'block';
        }
    </script>
</body>

</html>
