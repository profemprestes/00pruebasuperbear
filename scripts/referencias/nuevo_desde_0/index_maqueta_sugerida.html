<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Facu Aventura V2 - Maqueta Sugerida</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #87CEEB;
            --teddy-brown: #8D6E63;
            --golden-coin: #FFD600;
            --dark-wood: #4E342E;
            --grass-green: #4CAF50;
            --bg-dark: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--sky-blue);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, .btn-voxel { font-family: 'Fredoka One', cursive; }

        /* Voxel 3D Button */
        .btn-voxel {
            background-color: var(--golden-coin);
            color: var(--dark-wood);
            border: 4px solid var(--dark-wood);
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--dark-wood);
            transition: all 0.1s ease;
            text-transform: uppercase;
        }
        .btn-voxel:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--dark-wood);
        }
        .btn-green { background-color: var(--grass-green); color: white; }
        .btn-small { padding: 10px 20px; font-size: 1rem; box-shadow: 0 4px 0 var(--dark-wood); }
        .btn-small:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--dark-wood); }

        /* Pantallas (SPA Simulator) */
        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0;
            animation: fadeIn 0.5s ease-in-out;
        }
        .screen.active { display: flex; }

        /* 1. Gatekeeper */
        #gatekeeper-screen { background: var(--sky-blue); z-index: 10; }
        .bear-placeholder {
            width: 150px; height: 150px;
            background: var(--teddy-brown);
            border: 5px solid var(--dark-wood);
            border-radius: 20px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem; color: white;
        }

        /* Caja de Diálogo */
        .dialogue-overlay {
            display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: white;
            border: 4px solid var(--dark-wood); border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 20;
            cursor: pointer;
        }
        .dialogue-speaker {
            position: absolute; top: -20px; left: 20px; background: var(--golden-coin);
            border: 3px solid var(--dark-wood); padding: 5px 15px; border-radius: 20px;
            font-family: 'Fredoka One'; font-size: 1.1rem;
        }
        .dialogue-text { font-size: 1.2rem; min-height: 60px; }

        /* 2. Arcade World */
        #arcade-screen { background: linear-gradient(180deg, var(--sky-blue) 0%, var(--grass-green) 100%); align-items: stretch; justify-content: flex-start;}
        .hud {
            display: flex; justify-content: space-between; padding: 15px 20px;
            background: rgba(0,0,0,0.5); color: white; font-family: 'Fredoka One'; font-size: 1.5rem;
        }
        .map-container { display: flex; flex-direction: column; align-items: center; padding-top: 50px; gap: 40px; flex-grow: 1; }
        .map-node {
            width: 80px; height: 80px; background: var(--golden-coin);
            border: 4px solid var(--dark-wood); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; cursor: pointer; box-shadow: 0 6px 0 var(--dark-wood);
            position: relative;
        }
        .map-node::after {
            content: attr(data-label); position: absolute; bottom: -25px;
            font-family: 'Fredoka One'; font-size: 0.9rem; color: white;
            text-shadow: 2px 2px 0 var(--dark-wood); width: 120px; text-align: center;
        }
        .map-node:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark-wood); }
        .node-connector { width: 6px; height: 40px; background: var(--dark-wood); margin-top: -40px; margin-bottom: -40px; z-index: -1; }

        /* Modal Voxel */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-voxel {
            background: #fff8dc; border: 6px solid var(--teddy-brown); border-radius: 16px;
            padding: 30px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: inset 0 0 20px rgba(141, 110, 99, 0.2), 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 3. RSVP / Dual View */
        #rsvp-screen { background: #2c3e50; justify-content: space-between; }
        .rsvp-kids { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .rsvp-kids h2 { color: var(--golden-coin); font-size: 2rem; margin-bottom: 30px; text-shadow: 2px 2px 0 #000; }
        .slots-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .save-slot {
            background: rgba(255,255,255,0.1); border: 4px solid var(--golden-coin);
            border-radius: 12px; padding: 20px; cursor: pointer; color: white; width: 150px;
            transition: all 0.2s;
        }
        .save-slot:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        .rsvp-adults {
            background: white; width: 100%; padding: 20px;
            border-top: 6px solid var(--dark-wood);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .adult-info { color: #333; font-size: 1rem; text-align: center; }
        .adult-actions { display: flex; gap: 15px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    </style>
</head>
<body>

    <!-- 1. Pantalla Gatekeeper -->
    <div id="gatekeeper-screen" class="screen active">
        <div class="bear-placeholder">🐻</div>
        <button class="btn-voxel" onclick="startIntro()">¡Entrar a la Partida! 🎮</button>

        <div class="dialogue-overlay" id="dialogue-box" onclick="finishIntro()">
            <div class="dialogue-speaker">Shicka</div>
            <div class="dialogue-text" id="typing-text"></div>
            <div style="text-align: right; font-size: 0.8rem; color: #666; margin-top: 10px;">Haz clic para continuar ▼</div>
        </div>
    </div>

    <!-- 2. Pantalla Arcade World -->
    <div id="arcade-screen" class="screen">
        <div class="hud">
            <div>⭐ <span id="star-count">0</span>/3</div>
            <div>Gran Facu Aventura</div>
        </div>
        <div class="map-container">
            <div class="map-node" data-label="Base KBOOM" onclick="openNode(1, '📍 Base KBOOM', 'Lugar: KBOOM (Av. Italia 3421)')">🏢</div>
            <div class="node-connector"></div>
            <div class="map-node" data-label="Día de Batalla" onclick="openNode(2, '📅 Día de la Batalla', 'Fecha: Domingo 24 de Mayo.<br>Hora: 18:30 a 21:00 hs.')">⚔️</div>
            <div class="node-connector"></div>
            <div class="map-node" data-label="Regla Vital" onclick="openNode(3, '⚠️ Regla de Supervivencia', '¡No te olvides las medias para saltar! Sin medias, hay game over.')">🧦</div>

            <button id="btn-advance" class="btn-voxel btn-green" style="display: none; margin-top: 30px;" onclick="goToRSVP()">¡Avanzar al Punto de Guardado! 💾</button>
        </div>
    </div>

    <!-- Modal para Arcade World -->
    <div class="modal-overlay" id="node-modal">
        <div class="modal-voxel">
            <h2 id="modal-title" style="color: var(--dark-wood); margin-bottom: 15px;">Título</h2>
            <p id="modal-desc" style="font-size: 1.2rem; color: #333; margin-bottom: 25px;">Descripción</p>
            <button class="btn-voxel btn-small" onclick="closeNode()">¡Entendido!</button>
        </div>
    </div>

    <!-- 3. Pantalla RSVP & Adultos -->
    <div id="rsvp-screen" class="screen">
        <div class="rsvp-kids">
            <h2>¡Misión completada!</h2>
            <p style="color: white; font-size: 1.2rem; margin-bottom: 20px;">Elegí tu Slot de Guardado para confirmar tu lugar en la partida.</p>
            <div class="slots-container">
                <div class="save-slot" onclick="confirmSave('Slot A')">
                    <div style="font-size: 2rem;">💾</div>
                    <div style="font-family: 'Fredoka One'; margin-top: 10px;">Slot A</div>
                </div>
                <div class="save-slot" onclick="confirmSave('Slot B')">
                    <div style="font-size: 2rem;">💾</div>
                    <div style="font-family: 'Fredoka One'; margin-top: 10px;">Slot B</div>
                </div>
                <div class="save-slot" onclick="confirmSave('Slot C')">
                    <div style="font-size: 2rem;">💾</div>
                    <div style="font-family: 'Fredoka One'; margin-top: 10px;">Slot C</div>
                </div>
            </div>
        </div>

        <div class="rsvp-adults">
            <div class="adult-info">
                <strong>Info para Padres:</strong> Lugar: KBOOM, Salto. Fecha: 24/05/2025 de 18:30 a 21:00 hs.
            </div>
            <div class="adult-actions">
                <button class="btn-voxel btn-small" style="background: white;" onclick="alert('Abriendo Google Maps...')">📍 Ver Mapa</button>
                <button class="btn-voxel btn-small" style="background: var(--sky-blue);" onclick="alert('Descargando archivo .ics de Calendario...')">📅 Agendar</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica de Navegación SPA
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Lógica Gatekeeper
        const introText = "¡Che, despertate! ¿Te vas a perder la partida de Facu? ¡Metele que sos un crack y ayudame a organizar este cumple de nivel 9!";
        let isTyping = false;

        function startIntro() {
            document.querySelector('#gatekeeper-screen .btn-voxel').style.display = 'none';
            document.getElementById('dialogue-box').style.display = 'block';
            isTyping = true;
            let i = 0;
            const textElement = document.getElementById('typing-text');
            textElement.innerHTML = '';

            function typeWriter() {
                if (i < introText.length && isTyping) {
                    textElement.innerHTML += introText.charAt(i);
                    i++;
                    setTimeout(typeWriter, 30);
                } else {
                    isTyping = false;
                }
            }
            typeWriter();
        }

        function finishIntro() {
            if(isTyping) {
                // Skip typing
                isTyping = false;
                document.getElementById('typing-text').innerHTML = introText;
            } else {
                switchScreen('arcade-screen');
            }
        }

        // Lógica Arcade World
        let stars = 0;
        const nodesOpened = new Set();

        function openNode(id, title, desc) {
            document.getElementById('modal-title').innerHTML = title;
            document.getElementById('modal-desc').innerHTML = desc;
            document.getElementById('node-modal').style.display = 'flex';

            if(!nodesOpened.has(id)) {
                nodesOpened.add(id);
                stars++;
                document.getElementById('star-count').innerText = stars;
                if(stars >= 3) {
                    document.getElementById('btn-advance').style.display = 'block';
                    // Aquí iría la lógica del confetti
                }
            }
        }

        function closeNode() {
            document.getElementById('node-modal').style.display = 'none';
        }

        function goToRSVP() {
            switchScreen('rsvp-screen');
        }

        // Lógica RSVP
        function confirmSave(slotName) {
            if(confirm(`¿Deseas guardar la partida en el ${slotName} y confirmar tu asistencia?`)) {
                alert("¡PARTIDA GUARDADA! Te esperamos en la fiesta. 🎉");
            }
        }
    </script>
</body>
</html>
